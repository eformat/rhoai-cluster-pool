apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rhai-workshop-plugin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rhai-workshop-plugin.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rhai-workshop-plugin.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "rhai-workshop-plugin.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rhai-workshop-plugin.fullname" . }}
      initContainers:
        - name: config-init
          image: {{ .Values.initImage }}
          command:
            - /bin/sh
            - -c
            - |
              # Enable the console plugin if not already enabled
              PLUGIN={{ include "rhai-workshop-plugin.fullname" . }}
              if kubectl get consoles.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' 2>/dev/null | grep -q "$PLUGIN"; then
                echo "Plugin $PLUGIN already enabled"
              else
                kubectl patch consoles.operator.openshift.io cluster --type=json \
                  -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
                echo "Plugin $PLUGIN enabled"
              fi

              # Generate config.json
              OPENSHIFT_AI_URL=$(kubectl get consolelink rhodslink -o jsonpath='{.spec.href}' 2>/dev/null || echo "")
              TUTORIAL_URLS=$(cat /config/tutorialUrls)
              cat > /config-out/config.json <<EOF
              {
                "openshiftAiUrl": "${OPENSHIFT_AI_URL}",
                "tutorialUrls": ${TUTORIAL_URLS}
              }
              EOF
          volumeMounts:
            - mountPath: /config
              name: workshop-config
              readOnly: true
            - mountPath: /config-out
              name: generated-config
      containers:
        - image: {{ .Values.image }}
          imagePullPolicy: Always
          name: {{ include "rhai-workshop-plugin.name" . }}
          ports:
            - containerPort: 9443
              protocol: TCP
          volumeMounts:
            - mountPath: /var/serving-cert
              name: plugin-serving-cert
              readOnly: true
            - mountPath: /etc/nginx/nginx.conf
              name: nginx-conf
              readOnly: true
              subPath: nginx.conf
            - mountPath: /usr/share/nginx/html/config.json
              name: generated-config
              readOnly: true
              subPath: config.json
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
        - name: plugin-serving-cert
          secret:
            defaultMode: 420
            secretName: {{ include "rhai-workshop-plugin.fullname" . }}-serving-cert
        - name: nginx-conf
          configMap:
            defaultMode: 420
            name: {{ include "rhai-workshop-plugin.fullname" . }}-nginx-conf
        - name: workshop-config
          configMap:
            defaultMode: 420
            name: {{ include "rhai-workshop-plugin.fullname" . }}-workshop-config
        - name: generated-config
          emptyDir: {}
