apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: {{ include "rhai-code-demo-plugin.fullname" . }}
  labels:
    {{- include "rhai-code-demo-plugin.labels" . | nindent 4 }}
spec:
  displayName: RHAI Code Demos Console Plugin
  backend:
    type: Service
    service:
      basePath: /
      name: {{ include "rhai-code-demo-plugin.fullname" . }}
      namespace: {{ .Release.Namespace }}
      port: 9443
