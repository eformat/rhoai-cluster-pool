apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rhai-code-demo-plugin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rhai-code-demo-plugin.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rhai-code-demo-plugin.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "rhai-code-demo-plugin.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "rhai-code-demo-plugin.fullname" . }}
      initContainers:
        - name: enable-plugin
          image: {{ .Values.initImage }}
          command:
            - /bin/sh
            - -c
            - |
              PLUGIN={{ include "rhai-code-demo-plugin.fullname" . }}
              if kubectl get consoles.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' 2>/dev/null | grep -q "$PLUGIN"; then
                echo "Plugin $PLUGIN already enabled"
              else
                kubectl patch consoles.operator.openshift.io cluster --type=json \
                  -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
                echo "Plugin $PLUGIN enabled"
              fi

              # Patch IngressController to allow iframe embedding
              echo "Patching IngressController to remove X-Frame-Options and Content-Security-Policy"
              kubectl patch ingresscontroller/default -n openshift-ingress-operator --type=merge -p "{
                \"spec\": {
                  \"httpHeaders\": {
                    \"actions\": {
                      \"response\": [
                        {
                          \"name\": \"X-Frame-Options\",
                          \"action\": { \"type\": \"Delete\" }
                        },
                        {
                          \"name\": \"Content-Security-Policy\",
                          \"action\": { \"type\": \"Delete\" }
                        }
                      ]
                    }
                  }
                }
              }"
      containers:
        - image: {{ .Values.image }}
          imagePullPolicy: Always
          name: {{ include "rhai-code-demo-plugin.name" . }}
          ports:
            - containerPort: 9443
              protocol: TCP
          volumeMounts:
            - mountPath: /var/serving-cert
              name: plugin-serving-cert
              readOnly: true
            - mountPath: /etc/nginx/nginx.conf
              name: nginx-conf
              readOnly: true
              subPath: nginx.conf
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
        - name: plugin-serving-cert
          secret:
            defaultMode: 420
            secretName: {{ include "rhai-code-demo-plugin.fullname" . }}-serving-cert
        - name: nginx-conf
          configMap:
            defaultMode: 420
            name: {{ include "rhai-code-demo-plugin.fullname" . }}-nginx-conf
