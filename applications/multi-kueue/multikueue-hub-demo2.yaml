# Hub-only Cohort — provides passthrough admission capacity.
# Spokes have their own Cohort managed by the booking app.
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: Cohort
metadata:
  name: unreserved
spec:
  resourceGroups:
  - coveredResources: ["cpu", "memory", "nvidia.com/gpu"]
    flavors:
    - name: "gpu-pool"
      resources:
      - name: "cpu"
        nominalQuota: 9
      - name: "memory"
        nominalQuota: 36Gi
      - name: "nvidia.com/gpu"
        nominalQuota: 8
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: WorkloadPriorityClass
metadata:
  name: high-priority
description: "High priority for MultiKueue preemption"
value: 10000
