{{- range $name, $spec := .Values.resourceFlavors }}
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: {{ $name }}
{{- if $spec }}
spec:
  {{- with $spec.nodeLabels }}
  nodeLabels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $spec.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $spec.topologyName }}
  topologyName: {{ . }}
  {{- end }}
{{- end }}
{{- end }}
